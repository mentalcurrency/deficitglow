<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Deficit Glow icon</title>
  <desc id="desc">Blush and lavender app icon with a glowing progress ring and DG letters.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="36" x2="430" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EF"/>
      <stop offset="0.45" stop-color="#F4A9B8"/>
      <stop offset="1" stop-color="#D8C8F1"/>
    </linearGradient>
    <linearGradient id="ring" x1="122" y1="92" x2="392" y2="406" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D86F8D"/>
      <stop offset="1" stop-color="#9B7FD1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#66494F" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#FFFDFB" stroke-width="34" opacity="0.72"/>
  <path d="M256 106a150 150 0 1 1-121 61" fill="none" stroke="url(#ring)" stroke-width="34" stroke-linecap="round" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="91" fill="#FFFDFB" opacity="0.88"/>
  <text x="256" y="278" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="84" font-weight="800" fill="#342F35">DG</text>
  <path d="M352 143c22 15 38 36 48 61" fill="none" stroke="#E9C98F" stroke-width="15" stroke-linecap="round"/>
</svg>
